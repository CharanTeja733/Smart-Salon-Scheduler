version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.5  # PostgreSQL 15 + PostGIS 3.5
    container_name: salon_postgres
    environment:
      POSTGRES_USER: salon_user
      POSTGRES_PASSWORD: salon_password
      POSTGRES_DB: salon_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon_user -d salon_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salon_network

  redis:
    image: redis:7-alpine
    container_name: salon_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salon_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salon_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://salon_user:salon_password@postgres:5432/salon_scheduler
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ENVIRONMENT=development
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY}
      - BOOKING_MIN_ADVANCE_HOURS=1
      - BOOKING_MAX_ADVANCE_DAYS=90
      - BOOKING_HOLD_MINUTES=10
      - DEPOSIT_PERCENTAGE=20.0
      - RATE_LIMIT_REQUESTS_PER_MINUTE=100
      - SALON_CACHE_TTL_SECONDS=604800
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - salon_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salon_celery_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://salon_user:salon_password@postgres:5432/salon_scheduler
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - RESEND_API_KEY=${RESEND_API_KEY}
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - salon_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salon_celery_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://salon_user:salon_password@postgres:5432/salon_scheduler
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - salon_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: salon_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    depends_on:
      - backend
    networks:
      - salon_network

  adminer:
    image: adminer:latest
    container_name: salon_adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - salon_network

networks:
  salon_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: